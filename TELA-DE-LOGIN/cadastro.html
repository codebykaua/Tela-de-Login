<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <header>
        
    </header>

    <main>
        <div class="topo">
        <h1>Cadastre-se</h1>
        <p>Faça seu cadastro para continuar.</p>
        </div>

        <div class="form">
            <form>
            <label for="nome-cadastro">Nome</label>
            <input type="name" id="nome-cadastro" placeholder="Digite seu nome" required>

            <label for="email-cadastro">E-mail</label>
            <input type="email" id="email-cadastro" placeholder="Digite seu email" required>

            <label for="senha-cadastro">Senha</label>
            <input type="password" id="senha-cadastro" placeholder="Digite sua senha" required>

            <label for="senha-confirma">Confirme sua senha</label>
            <input type="password" id="senha-confirma" placeholder="Confirme sua senha" required>

            <button type="submit" id="Btn-continuar">Continuar</button>
            <a href="index.html">Cadastre-se</a>
            </form>
        </div>
    </main>

    <footer>
        <p>Todos direitos reservados. cody by Kauã.</p>
    </footer>

    <script src="script/cadastro.js"></script>
</body>
</html>
